<mat-form-field [appearance]="appearance" [ngClass]="{ 'v-input-field__small': size === 'small' }">
    <mat-label>{{ label }}</mat-label>

    <mtx-select
        #select
        [closeOnSelect]="!multiple"
        [formControl]="control"
        [items]="options"
        [loading]="progress"
        [markFirst]="true"
        [multiple]="multiple"
        [notFoundText]="externalSearch && !searchStr ? 'Enter your search term' : 'No items found'"
        [required]="required"
        [searchable]="true"
        [searchFn]="search"
        [selectableGroup]="true"
        [selectableGroupAsModel]="false"
        bindLabel="label"
        bindValue="value"
        groupBy="type"
        (change)="close(select)"
        (clear)="searchChange.emit(''); searchStr = ''"
        (search)="searchChange.emit($event.term); searchStr = $event.term"
    >
        <ng-template let-index="index" let-item="item" let-item$="item$" ng-optgroup-tmp>
            @if (multiple) {
                <mat-checkbox
                    [ngModel]="item$.selected"
                    class="checkbox-option"
                    id="item-{{ index }}"
                >
                    {{ item.type | uppercase }}
                </mat-checkbox>
            } @else {
                {{ item.type | uppercase }}
            }
        </ng-template>
        <ng-template let-index="index" let-item="item" let-item$="item$" ng-option-tmp>
            @if (multiple) {
                <mat-checkbox
                    [ngModel]="item$.selected"
                    class="checkbox-option"
                    id="item-{{ index }}"
                >
                    <ng-container *ngTemplateOutlet="text"></ng-container>
                </mat-checkbox>
            } @else {
                <ng-container *ngTemplateOutlet="text"></ng-container>
            }
            <ng-template #text>
                <div class="label">{{ item.label }}</div>
                @if (item.description) {
                    <div class="description mat-label-medium text-[var(--mat-sys-outline)]">
                        {{ item.description }}
                    </div>
                }
            </ng-template>
        </ng-template>
    </mtx-select>

    <mat-hint>{{ hintText }}</mat-hint>
    <mat-error>{{ error }}</mat-error>
</mat-form-field>
