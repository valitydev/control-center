@if (!(extensionResult$ | async)?.hidden) {
    <div [ngSwitch]="data?.typeGroup">
        @if ((extensionResult$ | async)?.type || (extensionResult$ | async)?.template) {
            <v-extension-field
                [data]="$any(data)"
                [extensions]="extensions"
                [formControl]="control"
            ></v-extension-field>
        } @else {
            <v-primitive-field
                *ngSwitchCase="'primitive'"
                [data]="$any(data)"
                [extensions]="extensions"
                [formControl]="control"
            ></v-primitive-field>
            <v-complex-form
                *ngSwitchCase="'complex'"
                [data]="$any(data)"
                [extensions]="extensions"
                [formControl]="control"
            ></v-complex-form>
            <ng-container *ngSwitchCase="'object'" [ngSwitch]="data.objectType">
                <v-struct-form
                    *ngSwitchCase="'struct'"
                    [data]="$any(data)"
                    [extensions]="extensions"
                    [formControl]="control"
                ></v-struct-form>
                <v-union-field
                    *ngSwitchCase="'union'"
                    [data]="$any(data)"
                    [extensions]="extensions"
                    [formControl]="control"
                ></v-union-field>
                <v-enum-field
                    *ngSwitchCase="'enum'"
                    [data]="$any(data)"
                    [formControl]="control"
                ></v-enum-field>
                <v-typedef-form
                    *ngSwitchCase="'typedef'"
                    [data]="$any(data)"
                    [extensions]="extensions"
                    [formControl]="control"
                ></v-typedef-form>
            </ng-container>
        }
    </div>
}
