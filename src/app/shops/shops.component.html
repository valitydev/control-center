<cc-page-layout fullHeight title="Shops">
    <cc-page-layout-actions>
        <button color="primary" mat-flat-button (click)="create()">Create</button>
    </cc-page-layout-actions>
    <cc-shops-table
        [hasMore]="hasMore$ | async"
        [progress]="progress$ | async"
        [shops]="shops$ | async"
        (filterChange)="searchParamsUpdated($event)"
        (more)="more()"
        (update)="reload($event)"
    ></cc-shops-table>
</cc-page-layout>
