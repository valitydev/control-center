<div
    cdkDropListGroup
    class="flex flex-col p-[15px] border border-[#ccc] rounded"
    (pointerdown)="isDragging = true"
    (pointerup)="isDragging = false"
>
    <div
        [cdkDropListData]="zoneData[0]"
        [class.active]="isDragging"
        cdkDropList
        cdkDropListSortingDisabled
        class="insert-zone"
        (cdkDropListDropped)="dropInZone($event, 0)"
    ></div>
    @for (row of rows; track $index) {
        <div
            [cdkDropListData]="row"
            [class.active]="isDragging"
            cdkDropList
            cdkDropListOrientation="horizontal"
            class="row-zone flex flex-row flex-nowrap gap-[10px] min-h-[50px] overflow-x-auto"
            (cdkDropListDropped)="dropInRow($event)"
        >
            @for (item of row; track item) {
                <div
                    cdkDrag
                    class="flex-1 border border-[#ccc] rounded text-black/[87%] cursor-move bg-white text-center text-sm min-w-[100px] font-sans shrink-0"
                >
                    {{ item }}
                </div>
            }
        </div>
        <div
            [cdkDropListData]="zoneData[$index + 1]"
            [class.active]="isDragging"
            cdkDropList
            cdkDropListSortingDisabled
            class="insert-zone"
            (cdkDropListDropped)="dropInZone($event, $index + 1)"
        ></div>
    }
</div>
