<cc-page-layout fullHeight title="Shops">
    <cc-page-layout-actions>
        <button mat-flat-button (click)="create()">Create</button>
    </cc-page-layout-actions>

    <cc-shops-table
        [progress]="progress$ | async"
        [shops]="shops$ | async"
        noPartyColumn
        (update)="reload($event)"
    ></cc-shops-table>
</cc-page-layout>
